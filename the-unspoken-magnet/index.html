        /* Book Container */

            justify-content: center; align-items: center;

            width: 90vw; height: calc(90vw * 1.414); 
            max-height: 85vh; max-width: 450px;

        }

    <div id="book-container">

    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "MAGNET99"; 
        const maxPages = 17; 

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                // Speed up transition
                $("#lock").fadeOut(400, function(){
                    $("#book-container").show();
                    loadAndInit();
                });
            } else { alert("စကားဝှက် မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            flipbook.empty();

            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // Priority loading for first 3 pages
                const img = $('<img />').attr({
                    'src': `page${i}.jpg`,
                    'loading': (i <= 3) ? 'eager' : 'lazy'
                });
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            // Quick initialization
            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    duration: 700,
                    when: { turning: function() { playSound(); } }
                });
            }, 150);

            // Click-to-flip functionality
            flipbook.on('click touchstart', function(e) {
                const width = $(this).width();
                const offset = $(this).offset();
                const pageX = (e.type === 'touchstart') ? e.originalEvent.touches[0].pageX : e.pageX;
                
                if (pageX) {
                    const relativeX = pageX - offset.left;
                    if (relativeX > width / 2) { $(this).turn('next'); } 
                    else { $(this).turn('previous'); }
                }
            });
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.pause(); s.currentTime = 0; s.play().catch(e => {}); }
        }

        // Handle window resize
        $(window).resize(function() {
            const flipbook = $("#flipbook");
            if (flipbook.data().turn) {
                flipbook.turn('size', flipbook.width(), flipbook.height());
            }
        });
    </script>
