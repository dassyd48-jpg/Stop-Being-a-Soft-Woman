<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #001a1d; color: #4ed9e6; font-family: sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; box-sizing: border-box; 
        }

        .quiz-container { 
            width: 100%; max-width: 500px; background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(78, 217, 230, 0.2); border-radius: 12px; 
            padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .phase-label { 
            font-size: 10px; color: #ffab40; letter-spacing: 3px; 
            text-transform: uppercase; font-weight: bold; opacity: 0.8;
        }

        h2 { font-size: 17px; line-height: 1.6; margin: 15px 0; color: #fff; }

        /* Option Styling */
        .option { 
            display: block; width: 100%; padding: 14px; margin: 10px 0; 
            background: rgba(78, 217, 230, 0.05); border: 1px solid rgba(78, 217, 230, 0.2); 
            color: #4ed9e6; border-radius: 8px; cursor: pointer; text-align: left; 
            transition: 0.3s ease; font-size: 13px; line-height: 1.5; 
        }

        .option:hover { 
            background: #4ed9e6; color: #000; font-weight: bold; 
            transform: translateX(8px); border-color: #fff;
        }

        /* Result Box & Next Button */
        #result-box { 
            display: none; margin-top: 15px; padding: 20px; 
            border: 1px solid #ffab40; background: rgba(255, 171, 64, 0.08); 
            border-radius: 10px; animation: fadeInUp 0.5s ease; 
        }

        .res-title { 
            font-size: 15px; font-weight: bold; color: #ffab40; 
            margin-bottom: 10px; display: block; border-left: 4px solid #ffab40; 
            padding-left: 10px; text-transform: uppercase;
        }

        .res-desc { color: #fff; font-size: 13px; line-height: 1.7; margin-bottom: 20px; }

        .next-btn { 
            display: block; width: 100%; padding: 15px; background: #ffab40; 
            color: #000; border: none; border-radius: 6px; font-weight: 900; 
            cursor: pointer; text-align: center; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }

        .next-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,171,64,0.3); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <span class="phase-label">BOUNDARY PROTECTION: PAGE 31</span>
    <h2 id="q-text">တစ်ဖက်လူက သင့်ရဲ့ ကိုယ်ပိုင်စည်းကမ်းကို ကျော်နင်းဖို့ ကြိုးစားလာရင် ဘယ်လို ကိုင်တွယ်မလဲ?</h2>
    
    <div id="options-group">
        <button class="option" onclick="showAnalysis('THE UNSHAKABLE', 'သင်ဟာ ကျောက်ဆောင်တစ်ခုလို မလှုပ်မယှက် ခိုင်မာသူပါ။ စည်းကမ်းကို လုံးဝ အလျှော့မပေးဘဲ မလိုက်နာနိုင်ရင် ထွက်သွားဖို့ လမ်းပြလိုက်ခြင်းက သင့်ရဲ့ ကိုယ်ပိုင်တန်ဖိုး (High Value) ကို ကမ္ဘာသိအောင် ကြေညာလိုက်တာပါပဲ။')">၁။ စည်းကမ်းကို လုံးဝ အလျှော့မပေးဘဲ မလိုက်နာနိုင်ရင် ထွက်သွားဖို့ လမ်းပြလိုက်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE ALPHA MIND', 'သင့်မှာ ပြင်းထန်တဲ့ ခေါင်းဆောင်မှု အရှိန်အဝါရှိပါတယ်။ ကိုယ့်စည်းကမ်းကို ကျော်နင်းရင် ပြင်းထန်တဲ့ အကျိုးဆက်ရှိမယ်ဆိုတာကို လက်တွေ့ပြသလိုက်ခြင်းဖြင့် နောင်ခါ ဘယ်သူမှ မကျူးကျော်ရဲအောင် တားဆီးနိုင်ပါတယ်။')">၂။ ကိုယ့်စည်းကမ်းကို ကျော်နင်းရင် ပြင်းထန်တဲ့ အကျိုးဆက်ရှိမယ်ဆိုတာကို ပြသလိုက်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE GHOST', 'သင်ဟာ စွမ်းအင်ကို တန်ဖိုးထားသူပါ။ အချိန်ကုန်ခံပြီး စကားအရှည်ကြီး မပြောတော့ဘဲ အဲ့ဒီလူကို သင့်ဘဝထဲက တိတ်တဆိတ် ဖယ်ထုတ်လိုက်ခြင်းဖြင့် သင့်ရဲ့ စိတ်အေးချမ်းမှုကို အထိရောက်ဆုံး ကာကွယ်လိုက်တာပါ။')">၃။ စကားအရှည်ကြီး မပြောတော့ဘဲ အဲ့ဒီလူကို တိတ်တဆိတ် ဖယ်ထုတ်လိုက်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE TEACHER', 'သင်ဟာ စံနှုန်းတွေကို ယုံကြည်ချက်ရှိရှိ တည်ဆောက်သူပါ။ စည်းကမ်းသတ်မှတ်ရခြင်းရဲ့ အကြောင်းရင်းကို ပြတ်သားစွာ ရှင်းပြခြင်းဖြင့် တစ်ဖက်လူကို နယ်နိမိတ် (Boundaries) ဆိုတာ ဘာလဲဆိုတာကို သိမြင်သွားစေပါတယ်။')">၄။ စည်းကမ်းသတ်မှတ်ရခြင်းရဲ့ အကြောင်းရင်းကို ပြတ်သားစွာ ရှင်းပြတယ်</button>
        
        <button class="option" onclick="showAnalysis('THE NEGOTIATOR', 'သင်ဟာ အခြေအနေကို လှည့်စားထိန်းချုပ်နိုင်စွမ်းရှိသူပါ။ ရန်လိုမယ့်အစား အခြေအနေကို ကိုင်တွယ်ပြီး ကိုယ့်ဘက်က အမြဲအသာရနေမယ့် နည်းလမ်းကို ရှာဖွေခြင်းက ပါးနပ်တဲ့ ဗျူဟာရှင်တစ်ယောက်ရဲ့ လုပ်ရပ်ပါ။')">၅။ အခြေအနေကို ထိန်းချုပ်ပြီး ကိုယ့်ဘက်က အသာရမယ့် နည်းလမ်းကို ရှာဖွေတယ်</button>
    </div>

    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        
        <button onclick="parent.postMessage('quizCompleted', '*')" class="next-btn">
            နောက်တစ်ခန်းသို့သွားရန် Lock ဖွင့်ပါ →
        </button>
    </div>
</div>

<script>
    function showAnalysis(title, desc) {
        document.getElementById('options-group').style.display = 'none';
        document.getElementById('q-text').style.opacity = '0.3';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
