    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;

        }

        /* Background Video - Lock Screen မှာ ပုံမှန်အတိုင်း */

        #lock p {

        #lock input {

            background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 16px;
        }

        #lock button {
            margin-top: 20px; 
            padding: 12px 40px; 
            border-radius: 5px; 
            border: 1px solid #ffffff;
            background: linear-gradient(145deg, #ffffff, #9e9e9e);
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;

        }

        #lock button:hover {

        }

        #book-container {
            display: none; width: 100%; height: 100%; 
            position: fixed; top: 0; left: 0; z-index: 10; background: #222;
        }

        #flipbook-wrapper {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        #flipbook {
            width: 90vw; 
            height: calc(90vw * 1.414); 
            max-height: 85vh; 
            max-width: 450px;

        .page { background: #222; width: 100%; height: 100%; border-radius: 5px; overflow: hidden; position: relative; }

        .turn-js-gradient {

<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

        <p>MASTER THE MYSTERY</p>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">ACCESS THE SHADOW</button>
        <div style="margin-top: 15px;">
            <a href="https://t.me/Dassy_Digital_Library" target="_blank" style="color: #b0bec5; text-decoration: none; font-size: 13px; opacity: 0.8;">
                📩 Don't have a password? Contact DASSY.
            </a>
        </div>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">POWERED BY DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3"></audio>

    <script>
        const myPassword = "DREAM99"; 
        const maxPages = 17; 

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(800, function(){
                    $("#book-container").fadeIn(600);
                    loadAndInit();
                });
            } else {
                alert("စကားဝှက် မှားယွင်းနေပါသည်။");
            }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            
            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                const img = $('<img loading="lazy" />').attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                const flipbookWidth = flipbook.width();
                const flipbookHeight = flipbookWidth * 1.414;

                flipbook.turn({
                    width: flipbookWidth,
                    height: flipbookHeight,
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 100,
                    duration: 1200,
                    when: { turning: function() { playSound(); } }
                });

                flipbook.bind('touchstart click', function(e) {
                    const width = $(this).width();
                    const offset = $(this).offset();
                    const pageX = e.pageX || (e.originalEvent.touches && e.originalEvent.touches[0].pageX);
                    
                    if (pageX) {
                        const relativeX = pageX - offset.left;
                        if (relativeX > width / 2) { $(this).turn('next'); } 
                        else { $(this).turn('previous'); }
                    }
                });
            }, 300);
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.currentTime = 0; s.play().catch(e => {}); }
        }
    </script>
