<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASSY BLOCK VAULT | ROYAL DIGITAL LIBRARY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --metallic-gold: #d4af37;
            --bright-gold: #f7e1ad;
            --shadow-gold: #8a6d3b;
            /* သင်ပေးပို့သော ပုံထဲမှ နောက်ခံအရောင် */
            --bg-dark: #1a1a1c;
            --bg-black: #050505;
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, var(--bg-dark), var(--bg-black));
            background-attachment: fixed;
            color: #ccc;
            font-family: 'Special Elite', cursive;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            text-align: center; padding: 140px 20px;
            width: 100%;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* Mandala Design အား Background တွင် ထည့်သွင်းခြင်း */
        header::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            /* Mandala SVG Pattern */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><g fill="none" stroke="%23d4af37" stroke-width="0.2" opacity="0.15"><circle cx="50" cy="50" r="40"/><circle cx="50" cy="50" r="35"/><path d="M50 10 L50 90 M10 50 L90 50 M21 21 L79 79 M79 21 L21 79"/><path d="M50 15 A35 35 0 0 1 85 50 L50 50 Z" fill="%23d4af37" opacity="0.05"/></g></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.4;
            z-index: 1;
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.5rem, 8vw, 4.2rem);
            margin: 0; letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 900;
            position: relative; z-index: 2;
            /* Gold Metallic Effect */
            background: linear-gradient(to bottom, var(--bright-gold) 0%, var(--metallic-gold) 50%, var(--shadow-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        header p {
            color: var(--metallic-gold);
            font-size: 0.9rem;
            margin-top: 25px;
            letter-spacing: 8px;
            text-transform: uppercase;
            position: relative; z-index: 2;
            opacity: 0.7;
        }

        .shelf {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px; width: 90%; max-width: 1200px; padding: 80px 0;
            position: relative; z-index: 2;
        }

        .vault-item {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.05);
            padding: 35px;
            transition: 0.5s;
            box-shadow: 0 15px 45px rgba(0,0,0,0.7);
        }

        .vault-item:hover {
            transform: translateY(-15px);
            border-color: var(--metallic-gold);
            background: rgba(20, 20, 20, 0.9);
        }

        .vault-item img {
            width: 100%; height: 420px; object-fit: cover;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
        }

        .price {
            font-size: 1.5rem; color: var(--bright-gold);
            margin-bottom: 35px; font-weight: bold;
            text-align: center;
        }

        .btn-buy {
            display: block; text-decoration: none; padding: 18px;
            background: linear-gradient(135deg, var(--shadow-gold), var(--metallic-gold));
            color: #000; text-align: center; font-weight: bold;
            letter-spacing: 3px; border-radius: 2px;
            transition: 0.3s;
        }

        .btn-buy:hover {
            background: var(--bright-gold);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: scale(1.03);
        }

        footer {
            padding: 100px; color: var(--shadow-gold);
            font-size: 0.7rem; letter-spacing: 6px;
            text-transform: uppercase; opacity: 0.4;
        }
    </style>
</head>
<body>

<header>
    <h1>DASSY BLOCK VAULT</h1>
    <p>PREMIUM DIGITAL ARCHIVE</p>
</header>

<div class="shelf">
    <div class="vault-item">
        <img src="dream-woman/page1.jpg" alt="Dream Woman">
        <div class="price">5,490 MMK</div>
        <a href="https://wa.me/95948432100" class="btn-buy">GET PASSWORD</a>
    </div>

    <div class="vault-item">
        <img src="https://via.placeholder.com/350x500/111/d4af37?text=ENGLISH+VAULT" alt="English Archive">
        <div class="price">5,490 MMK</div>
        <a href="https://wa.me/95948432100" class="btn-buy">GET PASSWORD</a>
    </div>

    <div class="vault-item">
        <img src="https://via.placeholder.com/350x500/111/d4af37?text=KIDS+VAULT" alt="Kids Archive">
        <div class="price">5,490 MMK</div>
        <a href="https://wa.me/95948432100" class="btn-buy">GET PASSWORD</a>
    </div>
</div>

<footer>© DASSY BLOCK VAULT | FORBIDDEN KNOWLEDGE</footer>

</body>
</html>
