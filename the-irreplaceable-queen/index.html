<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>The Irreplaceable Queen | THE EMPEROR</title>
    <meta name="description" content="အမျိုးသားတို့ 
မစွန့်လွှတ်နိုင်သော ဧကရီ Shadow Psychology နည်းဗျူဟာများ။">
    <meta name="keywords" content="The Irreplaceable Queen, Shadow Psychology Myanmar, Dassy, Relationship Advice">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; font-family: sans-serif;
        }

        /* Background Video */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; transition: opacity 1.5s;
        }

        /* Lock Screen */
        #lock {
            position: fixed; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 20; background: rgba(0,0,0,0.7);
            color: #d4af37; text-align: center;
        }
        #lock h2 { letter-spacing: 5px; margin-bottom: 10px; font-size: 28px; text-transform: uppercase; }
        #lock p { color: #fff; font-size: 14px; margin-bottom: 25px; opacity: 0.8; }
        #lock input {
            padding: 15px; width: 220px; border-radius: 5px; border: 1px solid #d4af37;
            background: rgba(0,0,0,0.6); color: #fff; text-align: center; outline: none; font-size: 16px;
        }
        #lock button {
            margin-top: 20px; padding: 12px 40px; border-radius: 5px; border: none;
            background: #d4af37; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #lock button:hover { background: #fff; transform: scale(1.05); }

        /* Book Layout */
        #book-container {
            display: none; width: 100%; height: 100%; 
            position: fixed; top: 0; left: 0; z-index: 10; background: #000;
        }

        #flipbook-wrapper {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        /* A4 Ratio Optimized (1:1.414) */
        #flipbook {
            width: 90vw; 
            height: calc(90vw * 1.414); 
            max-height: 85vh; 
            max-width: 450px; /* ဖုန်းမှာကြည့်ရင် အချိုးအစားအမှန်ကန်ဆုံးဖြစ်အောင် */
        }

        .page { background: #1a1a1a; width: 100%; height: 100%; }
        .page img { width: 100%; height: 100%; object-fit: fill; } /* A4 ပုံတွေဖြစ်လို့ fill သုံးတာ ပိုအဆင်ပြေပါတယ် */

        .watermark {
            position: fixed; bottom: 15px; width: 100%; text-align: center;
            font-size: 10px; color: rgba(212, 175, 55, 0.4); letter-spacing: 3px;
            pointer-events: none; z-index: 100; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <h2>THE IRREPLACEABLE QUEEN</h2>
        <p>ENTER THE THRONE OF POWER</p>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">ACCESS STRATEGY</button>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">POWERED BY DASSY</div>
    </div>

    <audio id="sound" src="flip.mp3"></audio>

    <script>
        const myPassword = "dassy123"; // ဓည စိတ်ကြိုက်ပြောင်းနိုင်သည်
        const maxPages = 16; // စာမျက်နှာ ၁၆ မျက်နှာ

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(800, function(){
                    $("#book-container").fadeIn(600);
                    loadAndInit();
                });
            } else {
                alert("စကားဝှက် မှားယွင်းနေပါသည်။");
            }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            
            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // Lazy loading ထည့်ထားပေးလို့ အင်တာနက်နှေးလည်း ဆိုက်မြန်မြန်ပွင့်ပါတယ်
                const img = $('<img loading="lazy" />').attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single', // ဖုန်းမှာ တစ်မျက်နှာချင်းစီဖတ်ဖို့ ပိုအဆင်ပြေစေသည်
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    duration: 1000,
                    when: { turning: function() { playSound(); } }
                });

                // Touch & Click Control (စာမျက်နှာလှန်ရန်)
                flipbook.bind('touchstart click', function(e) {
                    const width = $(this).width();
                    const offset = $(this).offset();
                    const pageX = e.pageX || (e.originalEvent.touches && e.originalEvent.touches[0].pageX);
                    
                    if (pageX) {
                        const relativeX = pageX - offset.left;
                        if (relativeX > width / 2) { $(this).turn('next'); } 
                        else { $(this).turn('previous'); }
                    }
                });
            }, 300);
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.currentTime = 0; s.play().catch(e => {}); }
        }
    </script>
</body>
</html>
