<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS' LEARNING VAULT | DASSY</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #050505; 
            font-family: sans-serif;
        }

        #viewport {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .header-title {
            color: #b38b59; letter-spacing: 3px; font-size: 1.2rem;
            margin-bottom: 20px; text-transform: uppercase; font-weight: bold;
        }

        #flipbook {
            width: 85vw; 
            height: calc(85vw * 1.414); 
            max-height: 75vh; 
            max-width: 450px;
        }

        .page { background: #fff; width: 100%; height: 100%; }
        .page img { width: 100%; height: 100%; object-fit: contain; background: white; }

        .cta-page { 
            background: #111 !important; color: #b38b59; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-align: center; padding: 20px;
        }

        .buy-btn { 
            background: #b38b59; color: #000; 
            padding: 12px 25px; text-decoration: none; 
            font-weight: bold; border-radius: 4px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="header-title">Kids' Learning Vault</div>
        
        <div id="flipbook">
            <div class="page"><img src="page1.jpg"></div>
            <div class="page"><img src="page2.jpg"></div>
            <div class="page"><img src="page3.jpg"></div>
            <div class="page"><img src="page4.jpg"></div>
            <div class="page"><img src="page5.jpg"></div>
            <div class="page"><img src="page6.jpg"></div>
            <div class="page"><img src="page7.jpg"></div>
            <div class="page"><img src="page8.jpg"></div>
            <div class="page"><img src="page9.jpg"></div>

            <div class="page cta-page">
                <h3>ဆက်လက်ဖတ်ရှုရန်</h3>
                <p>စာမျက်နှာ ၁၅၆ မျက်နှာလုံးကို<br>PDF ဖြင့် ရယူနိုင်ပါသည်။</p>
                <a href="https://t.me/Dassy_Digital_Library" class="buy-btn">ဝယ်ယူရန် ဆက်သွယ်ပါ</a>
            </div>
        </div>
    </div>

    <audio id="flip-sound" src="flip.mp3"></audio>

    <script>
        $(window).ready(function() {
            $("#flipbook").turn({
                width: $("#flipbook").width(),
                height: $("#flipbook").height(),
                autoCenter: true,
                display: 'single',
                acceleration: true,
                when: {
                    turning: function() {
                        const sound = document.getElementById("flip-sound");
                        if(sound) { sound.currentTime = 0; sound.play().catch(e => {}); }
                    }
                }
            });
        });
    </script>
</body>
</html>
