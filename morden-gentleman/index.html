<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>THE MODERN GENTLEMAN | DASSY Digital Library</title>

    <meta name="description" content="Master the art of high-value masculinity. Explore the principles of presence, character, and visual authority. Official digital book by DASSY Digital Library.">
    <meta name="keywords" content="Modern Gentleman Myanmar, High Value Man, Masculinity, Visual Authority, DASSY Digital Library, Personal Growth for Men, Gentleman's Guide">
    <meta name="author" content="DASSY Digital Library">

    <meta property="og:type" content="book">
    <meta property="og:title" content="THE MODERN GENTLEMAN: The Path to Authority">
    <meta property="og:description" content="အမျိုးသားတစ်ယောက်ရဲ့ အဆင့်အတန်းနဲ့ ဩဇာအာဏာကို တည်ဆောက်ခြင်းဆိုင်ရာ လမ်းညွှန်ချက်များ။">
    <meta property="og:image" content="page1.jpg">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        /* Base Styling */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; 
        }

        /* Background Video */
        #bg-video { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 0; transition: opacity 1.2s; 
        }

        /* Lock Screen UI */
        #lock {
            position: fixed; width: 100%; height: 100%; display: flex; 
            justify-content: center; align-items: center; flex-direction: column; 
            z-index: 20; background: rgba(0,0,0,0.85); color: #d4af37; text-align: center;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }

        .silver-text {
            background: linear-gradient(to bottom, #cfd8dc 0%, #ffffff 50%, #b0bec5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-weight: bold; text-transform: uppercase;
        }

        #lock h2 { 
            letter-spacing: 5px; margin-bottom: 10px; font-size: 24px; 
            padding: 0 20px; line-height: 1.4;
        }

        #lock p { font-size: 12px; letter-spacing: 4px; color: #b0bec5; margin-bottom: 30px; }

        #lock input {
            padding: 15px; width: 250px; border-radius: 4px; border: 1px solid rgba(176,190,197,0.3);
            background: rgba(255,255,255,0.03); color: #fff; text-align: center; 
            outline: none; font-size: 16px; letter-spacing: 2px;
        }

        #lock button {
            margin-top: 25px; padding: 14px 50px; border-radius: 4px; border: none;
            background: linear-gradient(145deg, #ffffff, #b0bec5); color: #000; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.2s;
        }
        #lock button:active { transform: scale(0.98); }

        /* Book Container */
        #book-container { 
            display: none; width: 100%; height: 100%; 
            position: fixed; top: 0; left: 0; z-index: 10; background: #0a0a0a; 
        }

        #flipbook-wrapper { 
            width: 100%; height: 100%; display: flex; 
            justify-content: center; align-items: center; 
        }

        #flipbook { 
            width: 90vw; height: calc(90vw * 1.414); 
            max-height: 85vh; max-width: 450px; 
            box-shadow: 0 30px 100px rgba(0,0,0,1); 
        }

        .page { background: #1a1a1a; width: 100%; height: 100%; }
        .page img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        .watermark { 
            position: fixed; bottom: 15px; width: 100%; text-align: center; 
            font-size: 10px; color: rgba(255, 255, 255, 0.2); z-index: 100; letter-spacing: 4px; 
        }

        .contact-link {
            margin-top: 25px; color: #b0bec5; text-decoration: none; 
            font-size: 12px; opacity: 0.7; border-bottom: 1px solid rgba(176,190,197,0.2);
            padding-bottom: 2px;
        }

        /* Hidden Content for SEO/AI */
        .ai-context { display: none; }
    </style>
</head>
<body>

    <div class="ai-context">
        <h1>THE MODERN GENTLEMAN: The Path to Authority</h1>
        <p>A comprehensive guide by DASSY Digital Library on masculine excellence, visual authority, and character development in the modern world.</p>
    </div>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <h2 class="silver-text">THE MODERN GENTLEMAN</h2>
        <p>DEFINE YOUR AUTHORITY</p>
        <input type="password" id="pass" placeholder="ENTER ACCESS CODE" autocomplete="off">
        <button onclick="unlock()">UNLOCK THE ARCHIVE</button>
        <a href="https://t.me/Dassy_Digital_Library" target="_blank" class="contact-link">
            📩 REQUEST ACCESS FROM DASSY
        </a>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">OFFICIAL RELEASE - DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3"></audio>

    <script>
        // --- CONFIGURATION ---
        const myPassword = "GENTLEMAN@19"; // ပြောင်းလဲလိုပါက ဒီနေရာမှာ ပြင်နိုင်ပါတယ်
        const maxPages = 38; // စာမျက်နှာအရေအတွက်
        // ---------------------

        const flipSound = document.getElementById("sound");

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(600, function(){
                    $("#book-container").fadeIn(500);
                    loadAndInit();
                });
            } else {
                alert("စကားဝှက် မှားယွင်းနေပါသည်။");
            }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            flipbook.empty();

            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // jpg သို့မဟုတ် png ကို စစ်ဆေးပါ
                const img = $('<img loading="lazy" />').attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 100,
                    duration: 1000,
                    when: {
                        turning: function(event, page, view) {
                            playSound();
                        }
                    }
                });
            }, 300);
        }

        function playSound(){ 
            if(flipSound) {
                flipSound.pause();
                flipSound.currentTime = 0;
                flipSound.play().catch(e => {});
            }
        }
    </script>
    <!-- Dassy's Real-time Tracker -->
<script>
  // BOOK_NAME နေရာမှာ စာအုပ်နာမည်လေး ပြောင်းပေးပါ (ဥပမာ- alpha-shadow)
  const bookName = 'morden-gentleman';

    .then(res => res.json())
    .then(data => {
      console.log("View Count Updated:", data.value);
    });
</script>
</body>
</html>
