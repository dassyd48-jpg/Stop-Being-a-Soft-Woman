<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE IRREPLACEABLE QUEEN | DASSY Digital Library</title>
    
    <meta name="description" content="ဘယ်သူနဲ့မှ အစားထိုးလို့မရတဲ့ ဘုရင်မတစ်ပါးလို သင့်ရဲ့ တန်ဖိုးကို မြှင့်တင်လိုက်ပါ။ Official digital book by DASSY Digital Library.">
    <meta property="og:title" content="THE IRREPLACEABLE QUEEN">
    <meta property="og:image" content="page1.jpg">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        
        #lock {
            position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 20; background: rgba(0,0,0,0.75); color: #d4af37; text-align: center;
        }

        .gold-text {
            background: linear-gradient(to bottom, #cfd8dc 0%, #ffffff 50%, #b0bec5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold;
        }

        #lock h2 { letter-spacing: 5px; margin-bottom: 10px; font-size: 26px; text-transform: uppercase; }
        
        #lock input {
            padding: 15px; width: 220px; border-radius: 5px; border: 1px solid #b0bec5;
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; font-size: 16px; outline: none;
        }

        #lock button {
            margin-top: 20px; padding: 12px 40px; border-radius: 5px; border: 1px solid #ffffff;
            background: linear-gradient(145deg, #ffffff, #9e9e9e); color: #000; font-weight: bold; cursor: pointer;
        }

        #book-container { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; z-index: 10; background: #1a1a1a; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #flipbook { width: 90vw; height: calc(90vw * 1.414); max-height: 85vh; max-width: 450px; box-shadow: 0 20px 80px rgba(0,0,0,0.9); }
        
        .page { background: #1a1a1a; width: 100%; height: 100%; }
        .page img { width: 100%; height: 100%; object-fit: fill; }
        
        .watermark { position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 10px; color: rgba(212, 175, 55, 0.4); z-index: 100; letter-spacing: 3px; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <h2 class="gold-text">THE IRREPLACEABLE QUEEN</h2>
        <p style="color: #b0bec5; letter-spacing: 2px;">OWN YOUR THRONE</p>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">REVEAL THE QUEEN</button>
        
        <div style="margin-top: 20px;">
            <a href="https://t.me/Dassy_Digital_Library" target="_blank" style="color: #b0bec5; text-decoration: none; font-size: 14px; opacity: 0.8; border-bottom: 1px solid #b0bec5;">
                📩 Don't have a password? Contact DASSY.
            </a>
        </div>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">POWERED BY DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "QUEEN99"; // ဒီနေရာမှာ စကားဝှက် ပြင်နိုင်ပါတယ်
        const maxPages = 20; // စာမျက်နှာအရေအတွက်ကို ဒီမှာ ပြင်နိုင်ပါတယ်

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").fadeOut(500);
                $("#lock").fadeOut(500, function(){
                    $("#book-container").show();
                    loadAndInit();
                });
            } else { alert("စကားဝှက် မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // ပထမ ၃ မျက်နှာကို အမြန်ဆုံး Load လုပ်မယ့်စနစ် (Optimized)
                const img = $(`<img loading="${i < 4 ? 'eager' : 'lazy'}" />`).attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    duration: 600, // လှန်တဲ့အမြန်နှုန်းကို သွက်လက်အောင် ထားထားပါတယ်
                    when: {
                        turned: function() { playSound(); },
                        // Heyzine Style အတွက် ထောင့်ကကိုင်မှ လှန်လို့ရအောင် တားထားပါတယ်
                        start: function(e, p, corner) {
                            if (!corner) e.preventDefault();
                        }
                    }
                });
            }, 100); 
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { 
                s.pause();
                s.currentTime = 0;
                s.play().catch(e => {}); 
            }
        }
    </script>
</body>
</html>
