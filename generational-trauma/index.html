<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE AUTOPSY OF A SOUL | DASSY DIGITAL LIBRARY</title>
    
    <!-- restored AI & SEO Meta Tags -->
    <meta name="description" content="The official interactive psychological book 'The Autopsy of a Soul' by DASSY. Exploring Generational Trauma and inner healing.">
    <meta name="keywords" content="Dassy, Dassy Digital Library, Generational Trauma, Psychology Myanmar, Interactive Book">
    <meta name="author" content="DASSY">
    
    <!-- restored Open Graph for Social Media -->
    <meta property="og:title" content="THE AUTOPSY OF A SOUL | DASSY">
    <meta property="og:description" content="Break free from the shadows of the past.">
    <meta property="og:image" content="cover.jpg">
    <meta property="og:type" content="book">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="turn.min.js"></script>

    <style>
        :root { 
            --gold: #D4AF37; 
            --emerald-bg: radial-gradient(circle, #061c18 0%, #000 100%);
            --bright-green: #2ecc71; 
            --neon-glow: 0 0 15px rgba(46, 204, 113, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.4); }
        
        #lock { 
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; 
            z-index: 20; background: rgba(0, 10, 8, 0.6); backdrop-filter: blur(8px); color: #fff; text-align: center; padding: 20px; 
        }

        .brand-label { font-size: 11px; color: var(--gold); letter-spacing: 5px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        
        .book-title { 
            color: var(--bright-green); 
            font-weight: 900; 
            letter-spacing: 6px; 
            font-size: clamp(22px, 5vw, 34px); 
            margin: 0 0 35px 0; 
            text-shadow: var(--neon-glow); 
            border-top: 1px solid rgba(212, 175, 55, 0.3); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 25px 0; 
            width: 100%; 
            max-width: 550px; 
        }

        .sub-title { font-size: 14px; letter-spacing: 2px; color: var(--bright-green); text-shadow: 0 0 8px rgba(46, 204, 113, 0.5); }
        
        #lock input { 
            padding: 16px; width: 280px; border: none; border-bottom: 2px solid var(--gold); 
            background: transparent; color: #fff; text-align: center; font-size: 18px; outline: none; margin-bottom: 30px; 
        }

        #lock button { 
            padding: 14px 70px; background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728); 
            color: #061c18; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 2px; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); transition: 0.3s;
        }

        #book-container { display: none; width: 100vw; height: 100vh; position: relative; z-index: 10; opacity: 0; background: var(--emerald-bg); }
        
        #flipbook-wrapper { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding-bottom: 10px; 
        }

        #flipbook {
            max-width: 100% !important;
            max-height: 100% !important;
        }

        .watermark { 
            position: absolute; 
            bottom: 8px; 
            width: 100%; 
            text-align: center; 
            font-size: 9px; 
            color: var(--gold); 
            opacity: 0.2; 
            letter-spacing: 2px; 
            pointer-events: none; 
            z-index: 15; 
        }
        
        #flipbook .page { background: #000; width: 100%; height: 100%; overflow: hidden; }
        
        /* Ensures images scale perfectly on phones */
        .page img {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }

        .quiz-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            background: #030d0b;
        }

        .quiz-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .request-label { margin-top: 20px; font-size: 11px; color: var(--gold); letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <span class="brand-label">DASSY DIGITAL LIBRARY PRESENTS</span>
        <h1 class="book-title">THE AUTOPSY OF A SOUL<br><span class="sub-title">(Generational Trauma)</span></h1>
        <input type="password" id="pass" placeholder="ACCESS KEY">
        <button onclick="unlock()">OPEN YOUR SOUL</button>
        <p class="request-label">REQUEST ACCESS FROM DASSY</p>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">© DASSY DIGITAL LIBRARY | ALL RIGHTS RESERVED</div>
    </div>

    <audio id="sound-flip" src="flip.mp3" preload="auto"></audio>
    <audio id="bgm-dark" src="dark_ambient.mp3" loop preload="auto"></audio>
    <audio id="bgm-light" src="calm_ethereal.mp3" loop preload="auto"></audio>

    <script>
        const myPassword = "D@AUTOPSY"; 
        const totalPages = 46; 
        const quizPages = [2, 9, 14, 19, 24, 29, 34, 39, 44, 46];
        let isQuizLocked = false;

        window.addEventListener("message", (event) => {
            if (event.data === "quizCompleted") { 
                isQuizLocked = false; 
            }
            if (event.data === "nextPage") { 
                isQuizLocked = false;
                setTimeout(() => { $("#flipbook").turn("next"); }, 300);
            }
        }, false);

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                $("#bg-video, #lock").fadeOut(1000, function() { $(this).remove(); });
                $("#book-container").show().animate({opacity: 1}, 1000);
                loadAndInit();
                const dark = document.getElementById("bgm-dark");
                dark.volume = 0.3; dark.play().catch(()=>{});
            } else {
                alert("ACCESS DENIED: ကုဒ်မှားယွင်းနေပါသည်။");
            }
        }

        function loadAndInit() {
            const flipbook = $("#flipbook");
            
            let isMobile = window.innerWidth < 600;
            let h = isMobile ? window.innerHeight * 0.92 : window.innerHeight * 0.88;
            let w = isMobile ? window.innerWidth * 0.98 : h * 0.707;

            for(let i=1; i<=totalPages; i++) {
                const pageDiv = $('<div class="page"></div>');
                if(quizPages.includes(i)) {
                    pageDiv.append(`<div class="quiz-container"><iframe src="quiz-collection.html?p=${i}" scrolling="no"></iframe></div>`);
                } else {
                    pageDiv.append($('<img />').attr('src', `page${i}.jpg`));
                }
                flipbook.append(pageDiv);
            }

            flipbook.turn({
                width: w, 
                height: h, 
                autoCenter: true, 
                display: isMobile ? 'single' : 'double', 
                acceleration: true,
                elevation: 50,
                when: {
                    turning: function(e, page) {
                        if (isQuizLocked) { 
                            e.preventDefault(); 
                            return; 
                        }
                        document.getElementById("sound-flip").play().catch(()=>{});
                    },
                    turned: function(e, page) {
                        isQuizLocked = quizPages.includes(page);
                        handleMusic(page);
                    }
                }
            });
        }

        function handleMusic(page) {
            const dark = document.getElementById("bgm-dark");
            const light = document.getElementById("bgm-light");
            if (page <= 22) {
                if (dark.paused) { light.pause(); dark.play().catch(()=>{}); }
            } else {
                if (light.paused) { dark.pause(); light.play().catch(()=>{}); }
            }
        }

        $(window).resize(() => {
            let isMobile = window.innerWidth < 600;
            let h = isMobile ? window.innerHeight * 0.92 : window.innerHeight * 0.88;
            let w = isMobile ? window.innerWidth * 0.98 : h * 0.707;
            $("#flipbook").turn("size", w, h);
            $("#flipbook").turn("display", isMobile ? 'single' : 'double');
        });
    </script>
</body>
</html>
