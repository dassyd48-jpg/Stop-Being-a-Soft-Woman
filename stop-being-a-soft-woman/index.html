<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STOP BEING A SOFT WOMAN | DASSY</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; font-family: sans-serif;
        }

        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; transition: opacity 1s;
        }

        #lock {
            position: fixed; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 20; background: rgba(0,0,0,0.4);
            color: #fff; text-align: center;
        }
        #lock h2 { letter-spacing: 5px; margin-bottom: 25px; }
        #lock input {
            padding: 15px; width: 220px; border-radius: 30px; border: 1px solid #fff;
            background: rgba(0,0,0,0.6); color: #fff; text-align: center; outline: none;
        }
        #lock button {
            margin-top: 20px; padding: 12px 40px; border-radius: 30px; border: none;
            background: #fff; color: #000; font-weight: bold; cursor: pointer;
        }

        #book-container {
            display: none; width: 100%; height: 100%; 
            position: fixed; top: 0; left: 0; z-index: 10; background: #000;
        }

        #flipbook-wrapper {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        #flipbook {
            width: 90vw; 
            height: calc(90vw * 1.414); 
            max-height: 80vh; 
            max-width: 450px;
        }

        .page { background: #000; width: 100%; height: 100%; }
        .page img { width: 100%; height: 100%; object-fit: contain; }

        .watermark {
            position: fixed; bottom: 15px; width: 100%; text-align: center;
            font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 3px;
            pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <h2>DASSY PRIVATE</h2>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">ENTER STRATEGY</button>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">POWERED BY DASSY</div>
    </div>

    <audio id="sound" src="flip.mp3"></audio>

    <script>
        const myPassword = "dassy123";
        // *** အရေးကြီးသည်- ပုံအရေအတွက်ကို Screenshot အတိုင်း ၁၅ ပုံ ပြောင်းထားသည် ***
        const maxPages = 15; 

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(500, function(){
                    $("#book-container").fadeIn(400);
                    loadAndInit();
                });
            } else {
                alert("Unauthorized Access.");
            }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            
            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // GitHub ထဲကအတိုင်း .jpg (စာလုံးအသေး) သုံးထားသည်
                const img = $('<img />').attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    duration: 1000,
                    when: { turning: function() { playSound(); } }
                });

                flipbook.bind('touchstart click', function(e) {
                    const width = $(this).width();
                    const offset = $(this).offset();
                    const pageX = e.pageX || (e.originalEvent.touches && e.originalEvent.touches[0].pageX);
                    
                    if (pageX) {
                        const relativeX = pageX - offset.left;
                        if (relativeX > width / 2) { $(this).turn('next'); } 
                        else { $(this).turn('previous'); }
                    }
                });
            }, 500);
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.currentTime = 0; s.play().catch(e => {}); }
        }
    </script>
</body>
</html>
