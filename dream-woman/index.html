    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Video Background - ပြန်ထည့်ပေးထားပါတယ် */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: opacity 1.5s; }
        
        #lock {
            position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 20; background: rgba(0,0,0,0.7); color: #d4af37; text-align: center;
        }

        .silver-text {
            background: linear-gradient(to bottom, #cfd8dc 0%, #ffffff 50%, #b0bec5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold;
        }

        #lock h2 { letter-spacing: 5px; margin-bottom: 10px; font-size: 26px; text-transform: uppercase; }
        #lock input {
            padding: 15px; width: 220px; border-radius: 5px; border: 1px solid #b0bec5;
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 16px;
        }

        #lock button {
            margin-top: 20px; padding: 12px 40px; border-radius: 5px; border: 1px solid #ffffff;
            background: linear-gradient(145deg, #ffffff, #9e9e9e); color: #000; font-weight: bold; cursor: pointer;
        }

        #book-container { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; z-index: 10; background: #222; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #flipbook { width: 90vw; height: calc(90vw * 1.414); max-height: 85vh; max-width: 450px; box-shadow: 0 20px 80px rgba(0,0,0,0.8); }
        .page { background: #222; width: 100%; height: 100%; }
        .page img { width: 100%; height: 100%; object-fit: fill; }

        .watermark { position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 10px; color: rgba(212, 175, 55, 0.4); z-index: 100; letter-spacing: 3px; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <h2 class="silver-text">How A MAN'S BRAIN PICKS HIS DREAM WOMAN</h2>
        <p style="color: #b0bec5;">MASTER THE MYSTERY</p>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">ACCESS THE SHADOW</button>
        <div style="margin-top: 15px;">
            <a href="https://t.me/Dassy_Digital_Library" target="_blank" style="color: #b0bec5; text-decoration: none; font-size: 13px; opacity: 0.8;">
                📩 Contact DASSY for Password
            </a>
        </div>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">POWERED BY DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3"></audio>

    <script>
        const myPassword = "DREAM99"; 
        const maxPages = 17; 

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(500, function(){
                    $("#book-container").fadeIn(400);
                    loadAndInit();
                });
            } else { alert("စကားဝှက် မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                const img = $('<img loading="lazy" />').attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 100,
                    duration: 1000,
                    when: {
                        turning: function() { playSound(); },
                        // Heyzine လိုမျိုး ထောင့်ကကိုင်လှန်မှရအောင် လုပ်ထားပါတယ်
                        start: function(event, pageObject, corner) {
                            if (corner === null) { event.preventDefault(); }
                        }
                    }
                });
            }, 200);
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.currentTime = 0; s.play().catch(e => {}); }
        }
    </script>
</body>
