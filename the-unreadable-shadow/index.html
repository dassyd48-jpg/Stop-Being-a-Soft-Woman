<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>THE UNREADABLE SHADOW | DASSY DIGITAL LIBRARY</title>
    <meta name="description" content="'The Unreadable Shadow' - ဘယ်သူမှ ဖတ်လို့မရတဲ့ Strategic Mystery ဗျူဟာမြောက် လျှို့ဝှက်ချက်တွေနဲ့ ကိုယ့်ကိုယ်ကိုယ် ကာကွယ်နည်း။ DASSY မှ ထုတ်ဝေသည်။">
    <meta name="keywords" content="The Unreadable Shadow, Dassy, Strategic Mystery Myanmar, Dark Psychology">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: opacity 1.5s; }

        #lock {
            position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 20; background: rgba(0,0,0,0.75); color: #d4af37; text-align: center;
        }

        .silver-text {
            background: linear-gradient(to bottom, #cfd8dc 0%, #ffffff 50%, #b0bec5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: bold; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        #lock h2 { letter-spacing: 5px; margin-bottom: 10px; font-size: 28px; text-transform: uppercase; }
        #lock p { color: #b0bec5; font-size: 14px; margin-bottom: 25px; letter-spacing: 2px; opacity: 0.9; }
        #lock input { padding: 15px; width: 220px; border-radius: 5px; border: 1px solid #b0bec5; background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 16px; }
        
        #lock button {
            margin-top: 20px; padding: 12px 40px; border-radius: 5px; border: 1px solid #ffffff;
            background: linear-gradient(145deg, #ffffff, #9e9e9e); color: #000; font-weight: bold;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #book-container { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; z-index: 10; background: #1a1a1a; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        #flipbook {
            width: 90vw; height: calc(90vw * 1.414); max-height: 85vh; max-width: 450px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.9);
        }

        .page { background: #222; width: 100%; height: 100%; border-radius: 5px; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: fill; }

        .watermark {
            position: fixed; bottom: 15px; width: 100%; text-align: center;
            font-size: 10px; color: rgba(212, 175, 55, 0.4); letter-spacing: 3px; z-index: 100;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <h2 class="silver-text">THE UNREADABLE SHADOW</h2>
        <p>MASTER THE MYSTERY</p>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">ACCESS THE SHADOW</button>
        <div style="margin-top: 25px;">
            <a href="https://t.me/Dassy_Digital_Library" target="_blank" 
               style="color: #b0bec5; text-decoration: none; font-size: 13px; border-bottom: 1px solid #b0bec5; opacity: 0.8; letter-spacing: 1px;">
               📩 Don't have a password? Contact DASSY
            </a>
        </div>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper"><div id="flipbook"></div></div>
        <div class="watermark">POWERED BY DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "SHADOW"; 
        const maxPages = 15; 

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(800, function(){
                    $("#book-container").fadeIn(600);
                    loadAndInit();
                });
            } else { alert("စကားဝှက် မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            flipbook.empty();

            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // ပထမ ၃ မျက်နှာကို ချက်ချင်း Load လုပ်ပြီး ကျန်တာကို Lazy Load လုပ်သည်
                const img = $(`<img loading="${i < 4 ? 'eager' : 'lazy'}" />`).attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 100,
                    duration: 1000,
                    when: { turning: function() { playSound(); } }
                });
            }, 200);

            flipbook.on('click touchstart', function(e) {
                const width = $(this).width();
                const offset = $(this).offset();
                const pageX = (e.type === 'touchstart') ? e.originalEvent.touches[0].pageX : e.pageX;
                
                if (pageX) {
                    const relativeX = pageX - offset.left;
                    if (relativeX > width / 2) { $(this).turn('next'); } 
                    else { $(this).turn('previous'); }
                }
            });
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.pause(); s.currentTime = 0; s.play().catch(e => {}); }
        }
    </script>
</body>
</html>
