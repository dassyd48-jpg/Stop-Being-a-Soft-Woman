<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>HIS
DREAM WOMAN | MASTER THE MYSTERY</title>
    <meta name="description" content="အလင်းထဲမှာ လူတိုင်းနဲ့အတူ ကပြနေစရာ မလိုပါဘူး။ အရိပ်ထဲကနေပဲ ပွဲကို အသာစီးနဲ့ ကစားပါ။ 'The Unreadable Shadow' ဟာ သင့်ရဲ့ တည်ရှိမှုကို Premium ဖြစ်စေပြီး၊ ဘယ်သူမှ ဖတ်လို့မရတဲ့ Strategic Mystery (ဗျူဟာမြောက် လျှို့ဝှက်ချက်) တွေနဲ့ ကိုယ့်ကိုယ်ကိုယ် ကာကွယ်နည်းဖြစ်ပါတယ်။">
    <meta name="keywords" content="HIS
DREAM WOMAN, Strategic Mystery Myanmar, Dassy, Premium Presence, Dark Psychology">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; font-family: sans-serif;
        }

        /* Background Video - Lock Screen မှာ ပုံမှန်အတိုင်း */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; transition: opacity 1.5s;
        }

        /* Lock Screen ပြင်ဆင်ချက် */
        #lock {
            position: fixed; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 20; background: rgba(0,0,0,0.7); /* ဗီဒီယိုကို ပိုမှောင်အောင်လုပ်ထားသည် */
            color: #d4af37; text-align: center;
        }

        /* ငွေရောင်လင်းလက်သော စာသား effect */
        .silver-text {
            background: linear-gradient(to bottom, #cfd8dc 0%, #ffffff 50%, #b0bec5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 15px rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        #lock h2 { 
            letter-spacing: 5px; 
            margin-bottom: 10px; 
            font-size: 28px; 
            text-transform: uppercase;
            /* ငွေရောင် Glossy Effect ထည့်သွင်းခြင်း */
            background: linear-gradient(145deg, #e0e0e0 0%, #ffffff 45%, #bdbdbd 55%, #f5f5f5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        #lock p { 
            color: #b0bec5; /* ငွေမှင်ရောင် */
            font-size: 14px; 
            margin-bottom: 25px; 
            opacity: 0.9; 
            letter-spacing: 2px;
        }

        #lock input {
            padding: 15px; width: 220px; border-radius: 5px; border: 1px solid #b0bec5;
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 16px;
        }

        /* ငွေရောင် Button */
        #lock button {
            margin-top: 20px; 
            padding: 12px 40px; 
            border-radius: 5px; 
            border: 1px solid #ffffff;
            background: linear-gradient(145deg, #ffffff, #9e9e9e);
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #lock button:hover { 
            background: #fff; 
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transform: scale(1.05); 
        }

        /* Book Layout */
        #book-container {
            display: none; width: 100%; height: 100%; 
            position: fixed; top: 0; left: 0; z-index: 10; background: #222; /* စာအုပ်ဝင်ဖတ်တဲ့ Background Color က Dark Grey ဖြစ်သည် */
        }

        #flipbook-wrapper {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        /* A4 Ratio Optimized (1:1.414) */
        #flipbook {
            width: 90vw; 
            height: calc(90vw * 1.414); 
            max-height: 85vh; 
            max-width: 450px; /* ဖုန်းမှာကြည့်ရင် အချိုးအစားအမှန်ကန်ဆုံးဖြစ်အောင် */
            
            /* စာမျက်နှာအားလုံး၏ အနောက်မှာ ကျမယ့် အရိပ် (The Main Drop Shadow) */
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
        }

        /* စာမျက်နှာအရောင်ကို Dark Grey သို့ ပြောင်းထားသည် */
        .page { background: #222; width: 100%; height: 100%; border-radius: 5px; overflow: hidden; position: relative; }
        .page img { width: 100%; height: 100%; object-fit: fill; } /* A4 ပုံတွေဖြစ်လို့ fill သုံးတာ ပိုအဆင်ပြေပါတယ် */

        /* စာရွက်ကြားက သဘာဝကျသော အရိပ် (Turn.js gradient effect) */
        .turn-js-gradient {
            background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 10%, rgba(0,0,0,0) 90%, rgba(0,0,0,0.5) 100%) !important;
        }

        .watermark {
            position: fixed; bottom: 15px; width: 100%; text-align: center;
            font-size: 10px; color: rgba(212, 175, 55, 0.4); letter-spacing: 3px;
            pointer-events: none; z-index: 100; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <h2 class="silver-text">How A MAN'S BRAIN PICKS HIS
DREAM WOMAN</h2>
        <p>MASTER THE MYSTERY</p>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">ACCESS THE SHADOW</button>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">POWERED BY DASSY</div>
    </div>

    <audio id="sound" src="flip.mp3"></audio>

    <script>
        const myPassword = "DREAM99"; // ဓည စိတ်ကြိုက်ပြောင်းနိုင်သည်
        const maxPages = 17; // စာမျက်နှာ ၁၇ မျက်နှာ

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(800, function(){
                    $("#book-container").fadeIn(600);
                    loadAndInit();
                });
            } else {
                alert("စကားဝှက် မှားယွင်းနေပါသည်။");
            }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            
            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // Lazy loading ထည့်ထားပေးလို့ အင်တာနက်နှေးလည်း ဆိုက်မြန်မြန်ပွင့်ပါတယ်
                const img = $('<img loading="lazy" />').attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                const flipbookWidth = flipbook.width();
                const flipbookHeight = flipbookWidth * 1.414; // Force A4 Ratio

                flipbook.turn({
                    width: flipbookWidth,
                    height: flipbookHeight,
                    autoCenter: true, 
                    display: 'single', // ဖုန်းမှာ တစ်မျက်နှာချင်းစီဖတ်ဖို့ ပိုအဆင်ပြေစေသည်
                    acceleration: true,
                    
                    // Realistic Shadow Effects
                    gradients: true, // စာရွက်ကြားက သဘာဝကျသော အရိပ်
                    elevation: 100, // စာရွက်လှန်တဲ့အခါ ကြွတက်လာမယ့် အမြင့် (Shadow ပိုပေါ်စေသည်)
                    
                    duration: 1200, // လှန်တဲ့နှုန်းကို နည်းနည်းလေး နှေးထားသည် (Smooth ဖြစ်စေရန်)
                    when: { turning: function() { playSound(); } }
                });

                // Touch & Click Control (စာမျက်နှာလှန်ရန်)
                flipbook.bind('touchstart click', function(e) {
                    const width = $(this).width();
                    const offset = $(this).offset();
                    const pageX = e.pageX || (e.originalEvent.touches && e.originalEvent.touches[0].pageX);
                    
                    if (pageX) {
                        const relativeX = pageX - offset.left;
                        if (relativeX > width / 2) { $(this).turn('next'); } 
                        else { $(this).turn('previous'); }
                    }
                });
            }, 300);
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.currentTime = 0; s.play().catch(e => {}); }
        }
    </script>
</body>
</html>
